  <p>
    Hi! I am Xuan Gong (<b>Xander Gong</b>), a first-year Ph.D. student in the School of Computer Science at Shanghai Jiao Tong University.
  </p>
  <p>
    My research focuses on the <b>optimization</b> and <b>alignment</b> of foundation models, with an emphasis on improving the reasoning, factuality, agentic capabilities, safety, and science applications of <b>large language models</b> and <b>vision-language models</b> (maybe world models in the future).
  </p>
  <p>
    <i>If you are interested in partnering on research projects, offering internship opportunities or exchange programs, I would be thrilled to connect with you.</i>
  </p>

